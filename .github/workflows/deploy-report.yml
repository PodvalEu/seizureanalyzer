name: Deploy Report to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build application
        run: ./gradlew installDist

      - name: Restore stored credential
        run: |
          mkdir -p data/tokens
          echo "${{ secrets.STORED_CREDENTIAL }}" | base64 -d > data/tokens/StoredCredential

      - name: Get today's date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate report
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CALENDAR_NAME: Rafael neurologie
          ANALYSIS_END: ${{ steps.date.outputs.today }}
        run: ./build/install/seizureanalyzer/bin/seizureanalyzer

      - name: Prepare pages directory
        run: |
          mkdir -p _site
          cp data/report.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
